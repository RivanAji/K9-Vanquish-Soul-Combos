let hand=[],threats=[],mode='dash',sel=1,zoom=.7,min=true,active=null;

function score(c){if(!hand.length)return 1;let s=0;for(const h of hand){if(c.hand.some(x=>mt(x,h)))s+=10;if(mt(c.name,h))s+=5;if((c.steps||[]).some(p=>mt(p,h)))s+=2}for(const t of threats){if(t.includes('Nibiru')||t.includes('Maxx')){if(c.name.includes('Safe')||c.name.includes('Stop'))s+=15}}return Math.max(0,s)}

function renderSide(){ $('#picked').innerHTML=hand.length?hand.map(x=>`<span class="chip on" data-v="${esc(x)}">${esc(x)} ×</span>`).join(''):'<span class="meta">Belum ada kartu dipilih.</span>'; $$('#picked .chip').forEach(x=>x.onclick=()=>rem(x.dataset.v));
$('#cards').innerHTML=DATA.starters.map(x=>`<span class="chip" data-v="${esc(x)}">${esc(x)}</span>`).join(''); $$('#cards .chip').forEach(x=>x.onclick=()=>add(x.dataset.v));
$('#threats').innerHTML=DATA.fallbacks.map(x=>`<span class="chip ${threats.includes(x[0])?'on':''}" data-v="${esc(x[0])}">${esc(x[0])}</span>`).join(''); $$('#threats .chip').forEach(x=>x.onclick=()=>toggleThreat(x.dataset.v));
const arr=filtered(),max=Math.max(...arr.map(x=>x.score),1); $('#list').innerHTML=arr.map(x=>`<button class="item ${mode==='detail'&&x.c.id===sel?'on':''}" data-id="${x.c.id}"><b>${x.c.id}. ${esc(x.c.name)}</b><div class="meta">${esc(x.c.hand.slice(0,4).join(' + '))}</div><div class="score"><span style="width:${Math.max(8,Math.round(x.score/max*100))}%"></span></div></button>`).join(''); $$('#list .item').forEach(b=>b.onclick=()=>{sel=+b.dataset.id;mode='detail';active=null;render()})}
function routesForHand(){if(!hand.length)return DATA.routes; return DATA.routes.filter(r=>r.trigger.some(t=>hand.some(h=>mt(t,h)||mt(h,t))))}
function typeFor(name){if(/Razen|Hollie|Mad Love|Jiaolong|Noroi|Jokul|Lantern|Izuna|Lupis|Borger|Caesar/i.test(name))return 'monster'; if(/Rock|Saryuja/i.test(name))return 'link'; if(/Ripper|N.As|Masquerade|Vallon|Werewolf|Rank|XYZ/i.test(name))return 'xyz'; if(/Start|Stake|Case|Dust/i.test(name))return 'spell'; if(/Release|Snow/i.test(name))return 'trap'; return 'decision'}
function dashboardGraph(){let nodes=[{id:'root',card:hand.length?hand.join(' + '):'Choose cards',type:'decision',text:'Klik cabang kartu kedua untuk membuka combo detail.',x:80,y:350,tag:'HAND'}],edges=[],row=0; let routeList=routesForHand(); routeList.forEach(r=>{let ry=110+row*210;let rid='r'+row;nodes.push({id:rid,card:r.root,type:'decision',text:'Starter family',x:340,y:ry,tag:'STARTER'});edges.push(['root',rid,r.root]);let bs=r.branches.filter(b=>!hand.length||hand.some(h=>mt(b[0],h)||mt(DATA.combos.find(c=>c.id===b[1])?.name||'',h))||filtered().slice(0,8).some(x=>x.c.id===b[1])); if(!bs.length)bs=r.branches.slice(0,4); bs.forEach((b,j)=>{let by=ry-70+j*110,bid=rid+'b'+j,cid=rid+'c'+j,c=DATA.combos.find(x=>x.id===b[1]);nodes.push({id:bid,card:b[0],type:'decision',text:c?(c.steps||[]).slice(0,3).join(' → '):'',x:620,y:by,tag:'CHOOSE'});edges.push([rid,bid,b[0]]);nodes.push({id:cid,card:c.name,type:'decision',text:(c.steps||[]).slice(0,3).join(' → '),x:900,y:by,tag:'OPEN',combo:c.id});edges.push([bid,cid,'open detail'])});row++});if(threats.length){nodes.push({id:'threat',card:'Opponent Disruption',type:'trap',text:threats.join(' + '),x:80,y:60,tag:'THREAT'});threats.forEach((t,i)=>{let fb=DATA.fallbacks.find(f=>f[0]===t);nodes.push({id:'fb'+i,card:t,type:'trap',text:fb?fb[1]:'Pivot route.',x:350,y:40+i*105,tag:'FALLBACK'});edges.push(['threat','fb'+i,'if hit'])})} return {nodes,edges}}
function isBranchStep(t){return /^(If|Branch:|Choose|Otherwise|Only if|Optional:|When|If YES|If NO)/i.test(String(t||'').trim())}
function detailGraph(c){
  let nodes=[],edges=[],x=80,y=180,last=null,i=0;
  function addNode(id,card,type,text,x0,y0,tag=''){nodes.push({id,card,type,text,x:x0,y:y0,tag})}
  function addEdge(a,b,l=''){edges.push([a,b,l])}
  while(i<(c.steps||[]).length){
    let p=c.steps[i];
    if(isBranchStep(p)){
      let branch=[];
      while(i<c.steps.length && isBranchStep(c.steps[i])){branch.push(c.steps[i]);i++}
      let dec='d'+i;
      addNode(dec,'Decision Point','decision','Pilih cabang sesuai kondisi field/hand Anda. Jangan jalankan semua opsi.',x,y,'BRANCH');
      if(last)addEdge(last,dec,'check');

        let oid=dec+'o'+j;
        addNode(oid,bp.split(':')[0].slice(0,32),typeFor(bp),bp,ox,y-total/2+j*135,'OPTION');
        addEdge(dec,oid,bp.split(':')[0].slice(0,18));
        addEdge(oid,dec+'m','continue');
      });
      addNode(dec+'m','Merge / Continue','decision','Setelah memilih 1 opsi, lanjut hanya jika route tersebut valid.',x+525,y,'MERGE');
      last=dec+'m'; x+=760;
    } else {
      let id='s'+i;
      let card=p.replace(/^Activate\s+/,'').replace(/^Normal Summon\s+/,'NS ').split('→')[0].slice(0,32);
      addNode(id,card,typeFor(p),p,x,y);
      if(last)addEdge(last,id,'');
      last=id; x+=220; i++;
    }
  }
  addNode('end','Endboard','decision',c.end.join(' + '),x+70,y);
  if(last)addEdge(last,'end','');
  return {nodes,edges}
}
function edgePath(x1,y1,x2,y2){let mid=(x1+x2)/2;return `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`}
function draw(g){$('#nodes').innerHTML=g.nodes.map(n=>`<div class="node ${n.type} ${active===n.id?'on':''}" style="left:${n.x}px;top:${n.y}px" data-id="${n.id}" data-combo="${n.combo||''}">${n.tag?`<p class="tag">${esc(n.tag)}</p>`:''}<h3>${esc(n.card)}</h3><p>${esc(n.text)}</p></div>`).join(''); $$('#nodes .node').forEach(n=>n.onclick=()=>{if(n.dataset.combo){sel=+n.dataset.combo;mode='detail';active=null;render();return} active=n.dataset.id; $('#detail').textContent=(g.nodes.find(x=>x.id===active)||{}).text||''; draw(g)});

function renderMain(){if(mode==='dash'){let g=dashboardGraph();$('#title').textContent='Recommended Flow Dashboard';$('#sub').textContent=hand.length?'Based on hand: '+hand.join(' + '):'Pick cards on the left to generate branch options.';draw(g);let rec=filtered().slice(0,6).map(x=>x.c.name);$('#best').textContent=hand.length?'Klik node OPEN untuk masuk detail combo. Rekomendasi: '+rec.join(' | '):'Pilih kartu di sidebar. Dashboard akan membuat cabang starter → kartu kedua → detail combo.';$('#end').innerHTML=rec.slice(0,5).map(x=>`<span>${esc(x)}</span>`).join('');let adv=threats.map(t=>(DATA.fallbacks.find(f=>f[0]===t)||[])[1]).filter(Boolean).join(' | ');$('#logic').textContent=adv||'Klik cabang seperti + FIRE, + DARK, + Jokul, atau OPEN.';$('#dis').innerHTML=DATA.fallbacks.map(f=>`<div class="dis"><span class="badge">Fallback</span><b>${esc(f[0])}</b><p>${esc(f[1])}</p></div>`).join('')}else{let c=combo();$('#title').textContent=c.id+'. '+c.name;$('#sub').textContent='Detail route · '+c.hand.join(' + ');draw(detailGraph(c));$('#best').textContent=(c.steps||[]).join(' → ');$('#end').innerHTML=c.end.map(x=>`<span>${esc(x)}</span>`).join('');$('#logic').textContent='Ikuti node linear. Jika ada slash/opsi dalam teks, kembali ke Dashboard dan pilih branch kartu aktual.';$('#dis').innerHTML=(c.activation||c.dis).map(d=>`<div class="dis"><span class="badge">How to activate</span><b>${esc(String(d).split(':')[0])}</b><p>${esc(String(d).split(':').slice(1).join(':')||d)}</p></div>`).join('')}}
