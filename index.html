<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>K9 Vanquish Soul Branch Choice Workflow v14</title>
<style>
:root {
  --bg:#07090f;--canvas:#10131d;--line:#30384b;--text:#f8fafc;--muted:#a8b2c3;--accent:#ff8f7a;
  --monster:#E7C6A1;--link:#B8D9FF;--xyz:#C9CDD6;--spell:#BFE3C5;--trap:#F6B8D0;--decision:#B9E6E4;
  --safe:#8ee6ad;--medium:#ffd36e;--high:#f5a1ae;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;overflow:hidden}
.app{display:grid;grid-template-columns:310px 1fr;grid-template-rows:1fr 360px;height:100vh}
.sidebar{grid-row:1/3;background:#0d121c;border-right:1px solid var(--line);overflow:auto;scrollbar-width:thin;scrollbar-color:#3d465b transparent}
.sidebar::-webkit-scrollbar,.combo-list::-webkit-scrollbar,.viewport::-webkit-scrollbar{width:7px;height:7px}
.sidebar::-webkit-scrollbar-thumb,.combo-list::-webkit-scrollbar-thumb,.viewport::-webkit-scrollbar-thumb{background:#3d465b;border-radius:999px}
.brand{padding:15px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#0d121c;z-index:5}
.brand h1{font-size:17px;margin:0}
.query{padding:13px;border-bottom:1px solid var(--line)}
.search{width:100%;background:#0b1020;border:1px solid var(--line);border-radius:12px;color:var(--text);padding:10px;outline:none}
.search:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.chip{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);border-radius:999px;padding:5px 8px;font-size:11.5px;cursor:pointer}
.chip:hover,.chip.active{border-color:var(--accent);background:rgba(255,143,122,.14);color:var(--text)}
.actions{display:flex;gap:8px;margin-top:9px}
.btn{border:1px solid var(--line);background:#20283a;color:var(--text);border-radius:10px;padding:7px 9px;cursor:pointer;font-size:12px}
.btn:hover{border-color:var(--accent)}.btn.primary{background:rgba(255,143,122,.2);border-color:rgba(255,143,122,.55)}
.combo-list{display:flex;flex-direction:column;gap:6px;padding:8px;overflow:auto}
.combo{text-align:left;border:1px solid transparent;background:rgba(255,255,255,.035);color:var(--text);border-radius:11px;padding:8px 9px;cursor:pointer}
.combo:hover{background:rgba(255,255,255,.07)}.combo.active{border-color:var(--accent);background:rgba(255,143,122,.13)}
.combo b{display:block;font-size:12.2px;margin-bottom:4px;line-height:1.25}.meta{font-size:10.9px;color:var(--muted);line-height:1.3}
.risk{display:inline-flex;gap:2px;margin-left:5px;vertical-align:middle}.risk i{width:7px;height:7px;border-radius:99px;background:#3d465b;display:block}
.risk.low i:nth-child(1){background:var(--safe)}.risk.medium i:nth-child(-n+2){background:var(--medium)}.risk.high i,.risk.veryhigh i{background:var(--high)}
.score{height:3px;background:#0b1020;border-radius:99px;margin-top:6px;overflow:hidden}.score span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#ffd6a5)}
.canvas{position:relative;overflow:hidden;background:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px),var(--canvas);background-size:26px 26px,26px 26px,auto}
.topbar{height:66px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 16px;background:rgba(7,9,15,.78);backdrop-filter:blur(12px);position:relative;z-index:5}
.title h2{font-size:18px;margin:0 0 3px}.title p{margin:0;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:900px}
.tools{display:flex;gap:7px}
.viewport{position:absolute;left:0;right:0;top:66px;bottom:0;overflow:auto;cursor:grab}
.board{position:relative;width:2400px;height:980px;transform-origin:0 0}
.edges{position:absolute;inset:0;pointer-events:none;overflow:visible}
.node{position:absolute;width:172px;min-height:78px;border:1px solid rgba(255,255,255,.34);border-radius:15px;padding:10px;cursor:pointer;box-shadow:0 10px 26px rgba(0,0,0,.22);background-image:none!important;transition:.15s}
.node:hover{filter:brightness(1.05);transform:translateY(-2px)}.node.active{outline:2px solid #fff}
.node h3{font-size:12.4px;margin:0 0 6px;color:currentColor;line-height:1.2}.node p{margin:0;color:currentColor;opacity:.82;font-size:11px;line-height:1.32}
.node.minimal p{display:none}.node.minimal{min-height:55px;width:152px}
.node .tag{font-weight:800;margin-bottom:5px;opacity:.95}
.node .handle-l,.node .handle-r{position:absolute;top:50%;width:12px;height:12px;border-radius:99px;background:#0b111a;border:2px solid rgba(255,255,255,.55)}
.node .handle-l{left:-7px}.node .handle-r{right:-7px}
.monster{background:var(--monster)!important;color:#2F2419!important}.link{background:var(--link)!important;color:#13283D!important}.xyz{background:var(--xyz)!important;color:#202632!important}.spell{background:var(--spell)!important;color:#18371F!important}.trap{background:var(--trap)!important;color:#421629!important}.decision,.branch,.merge{background:var(--decision)!important;color:#0F3434!important}
.edge-label{fill:var(--muted);font-size:11px}
.bottom{grid-column:2;display:grid;grid-template-columns:1fr 1.25fr 1fr 1fr;grid-template-rows:118px 1fr;grid-template-areas:"combo end selected branch" "dis dis dis dis";background:#0d121c;border-top:1px solid var(--line);overflow:hidden}
.panel{padding:12px 14px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;min-width:0}
.combo-panel{grid-area:combo}.endboard-panel{grid-area:end;text-align:center}.selected-panel{grid-area:selected}.branch-panel{grid-area:branch;border-right:0}.disruption-panel{grid-area:dis;border-right:0;border-bottom:0}
.panel h3{margin:0 0 8px;font-size:10.5px;line-height:1.2;letter-spacing:.14em;color:var(--muted);text-align:left}.endboard-panel h3{text-align:center}
#best,#nodeDetail,#branchText{display:block;margin:0;max-height:74px;overflow:auto;font-size:11.4px;line-height:1.35;color:var(--muted)}
.end{display:flex;flex-wrap:wrap;justify-content:center;align-content:flex-start;gap:6px;max-height:74px;overflow:auto}
.end span{display:inline-flex;align-items:center;justify-content:center;padding:5px 8px;font-size:11px;line-height:1.15;border-radius:999px;white-space:nowrap;background:rgba(255,255,255,.055);border:1px solid #334058}
#disruptions{display:flex;flex-direction:row;flex-wrap:nowrap;gap:8px;width:100%;height:165px;overflow-x:auto;overflow-y:hidden;padding:2px 2px 12px;scroll-snap-type:x proximity;scrollbar-width:thin;scrollbar-color:#3d465b transparent}
#disruptions::-webkit-scrollbar{height:7px}#disruptions::-webkit-scrollbar-thumb{background:#3d465b;border-radius:999px}#disruptions::-webkit-scrollbar-track{background:#111723;border-radius:999px}
.dis{flex:0 0 230px;width:230px;height:126px;padding:8px 9px;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:12px;overflow:hidden;cursor:pointer}
.dis:hover{border-color:var(--accent)}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:2px 6px;font-size:9px;color:var(--muted);margin-bottom:4px}
.dis b{display:block;font-size:11.7px;line-height:1.15;margin-bottom:3px}.dis p{font-size:10.7px;line-height:1.25;margin:3px 0 0;color:var(--muted);display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}.dis p:nth-of-type(1){-webkit-line-clamp:3}.dis p:nth-of-type(2){-webkit-line-clamp:1;opacity:.74}
.mobile-open{display:none;position:fixed;left:12px;bottom:12px;z-index:50}.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40}
@media(max-width:1200px){.app{grid-template-rows:1fr 440px}.bottom{grid-template-columns:1fr 1fr;grid-template-rows:112px 112px 1fr;grid-template-areas:"combo end" "selected branch" "dis dis"}.endboard-panel,.branch-panel{border-right:0}}
@media(max-width:760px){body{overflow:auto}.app{display:block;height:auto}.sidebar{position:fixed;inset:0 auto 0 0;width:min(88vw,330px);z-index:60;transform:translateX(-105%);transition:.25s}body.menu .sidebar{transform:translateX(0)}body.menu .backdrop{display:block}.canvas{height:72vh}.bottom{display:block}.panel{min-height:112px;border-right:0}.mobile-open{display:block}}
</style>
</head>

function norm(s){return String(s||"").toLowerCase().replace(/[!.,]/g,"").trim()}
function match(a,b){a=norm(a);b=norm(b);return a.includes(b)||b.includes(a)}
function combo(){return combos.find(c=>c.id===selected)||combos[0]}
function riskClass(r){r=norm(r).replace(/\s/g,''); if(r.includes('very'))return 'veryhigh'; if(r.includes('high'))return 'high'; if(r.includes('medium')||r.includes('variable'))return 'medium'; return 'low'}

function score(c){if(!hand.length)return 1;let s=0;for(const h of hand){if(c.hand.some(x=>match(x,h)))s+=10;if(match(c.name,h))s+=5;if(c.steps.some(st=>match(st.card,h)||match(st.action,h)))s+=2;if(c.disruption.some(d=>match(d.card,h)||match(d.effect,h)))s+=1}if(hand.every(h=>c.hand.some(x=>match(x,h))||c.steps.some(st=>match(st.card,h))))s+=7;return s}

function typeClass(t){return ["monster","link","xyz","spell","trap","decision"].includes(t)?t:"decision"}

function buildGraph(c){
  let nodes=[], edges=[];
  let x=90, y=170, stepGap=200, optGap=150, lastId=null;
  function addNode(id, card, type, action, x0, y0, tag=''){nodes.push({id,card,type:typeClass(type),action,x:x0,y:y0,tag});}
  function addEdge(a,b,label=''){edges.push({from:a,to:b,label});}
  c.steps.forEach((s,idx)=>{
    const id='s'+idx;
    addNode(id,s.card,s.type,s.action,x,y);
    if(lastId) addEdge(lastId,id);
    if(s.options && s.options.length){
      const mergeId='m'+idx;
      const optX=x+stepGap;
      const total=(s.options.length-1)*optGap;
      s.options.forEach((o,j)=>{
        const oid='o'+idx+'_'+j;
        addNode(oid,o.card,o.type,o.action,optX,y-total/2+j*optGap,o.label);
        addEdge(id,oid,o.label);
        addEdge(oid,mergeId,'continue');
      });
      addNode(mergeId,'Merge / Continue','decision','After choosing the branch, continue only through the route that matches the card you actually selected.',x+stepGap*2,y);
      lastId=mergeId;
      x += stepGap*3;
    } else {
      lastId=id;
      x += stepGap;
    }
  });
  if(c.branches && c.branches.length){
    const baseX=x+50, total=(c.branches.length-1)*160;
    c.branches.forEach((b,j)=>{
      const bid='b'+j;
      addNode(bid,b.target,'decision',b.desc,baseX,y-total/2+j*160,b.label);
      addEdge(lastId,bid,b.label);
      addEdge(bid,'end','');
    });
    addNode('end','Endboard','decision',c.endboard.join(' + '),baseX+250,y);
  } else {
    addNode('end','Endboard','decision',c.endboard.join(' + '),x+50,y);
    addEdge(lastId,'end');
  }
  return {nodes,edges};
}

function edgePath(x1,y1,x2,y2){const mid=(x1+x2)/2;return `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`}
function renderCanvas(){const c=combo(),g=buildGraph(c);$("#title").innerHTML=`${c.id}. ${esc(c.name)} ${riskDots(c.risk)}`;$("#subtitle").textContent=`${c.group} · Hand: ${c.hand.join(' + ')}`;$("#nodes").innerHTML=g.nodes.map(n=>`<div class="node ${n.type} ${n.id.startsWith('o')||n.id.startsWith('b')?'branch':''} ${n.id.startsWith('m')?'merge':''} ${minimalist?'minimal':''} ${activeNode===n.id?'active':''}" style="left:${n.x}px;top:${n.y}px" data-id="${n.id}"><span class="handle-l"></span><span class="handle-r"></span>${n.tag?`<p class="tag">${esc(n.tag)}</p>`:''}<h3>${esc(n.card)}</h3><p>${esc(n.action)}</p></div>`).join("");$$("#nodes .node").forEach(n=>n.onclick=()=>{activeNode=n.dataset.id;updateNodeDetail(g);highlight()});const svg=$("#edges");svg.innerHTML="";const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");defs.innerHTML='<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="rgba(255,255,255,.42)"/></marker>';svg.appendChild(defs);const map=Object.fromEntries(g.nodes.map(n=>[n.id,n]));g.edges.forEach(e=>{const a=map[e.from],b=map[e.to];if(!a||!b)return;const w=minimalist?152:172,h=minimalist?28:40;const x1=a.x+w,y1=a.y+h,x2=b.x,y2=b.y+h;const path=document.createElementNS("http://www.w3.org/2000/svg","path");path.setAttribute("d",edgePath(x1,y1,x2,y2));path.setAttribute("stroke",e.label?"rgba(255,143,122,.86)":"rgba(255,255,255,.28)");path.setAttribute("stroke-width",e.label?2.2:1.6);path.setAttribute("fill","none");path.setAttribute("marker-end","url(#arrow)");svg.appendChild(path);if(e.label){const t=document.createElementNS("http://www.w3.org/2000/svg","text");t.setAttribute("x",(x1+x2)/2-38);t.setAttribute("y",(y1+y2)/2-8);t.setAttribute("class","edge-label");t.textContent=e.label;svg.appendChild(t)}});setZoom(zoom)}
function renderBottom(){const c=combo();$("#best").textContent=c.best;$("#endboard").innerHTML=c.endboard.map(x=>`<span>${esc(x)}</span>`).join("");$("#disruptions").innerHTML=c.disruption.map(d=>`<div class="dis" data-card="${esc(d.card)}"><span class="badge">${esc(d.timing)}</span><b>${esc(d.card)}</b><p>${esc(d.effect)}</p><p>Req: ${esc(d.req||'-')}</p></div>`).join("");$$("#disruptions .dis").forEach(d=>d.onclick=()=>{const g=buildGraph(c);const hit=g.nodes.find(n=>match(n.card,d.dataset.card));if(hit){activeNode=hit.id;updateNodeDetail(g);highlight()}});let optTexts=[];c.steps.forEach(s=>{if(s.options) optTexts.push(`${s.card}: `+s.options.map(o=>`${o.label} → ${o.card}`).join(' | '))});let br=(c.branches||[]).map(b=>`${b.label} → ${b.target}: ${b.desc}`);$("#branchText").textContent=[...optTexts,...br].join(" || ") || "Linear line: resolve steps in order.";updateNodeDetail(buildGraph(c))}

function setZoom(z){zoom=Math.min(1.25,Math.max(.45,z));$("#board").style.transform=`scale(${zoom})`}
function fit(){zoom=window.innerWidth<900?.52:.72;setZoom(zoom);$("#viewport").scrollTo({left:0,top:0,behavior:"smooth"})}
$("#addBtn").onclick=()=>addHand();$("#q").addEventListener("keydown",e=>{if(e.key==="Enter")addHand()});$("#clearBtn").onclick=()=>{hand=[];activeNode=null;render()};$("#plus").onclick=()=>setZoom(zoom+.08);$("#minus").onclick=()=>setZoom(zoom-.08);$("#fit").onclick=fit;$("#mode").onclick=()=>{minimalist=!minimalist;$("#mode").textContent=minimalist?"Detailed":"Minimalist";renderCanvas()};
let dragging=false,sx=0,sy=0,sl=0,st=0;$("#viewport").addEventListener("mousedown",e=>{dragging=true;sx=e.pageX;sy=e.pageY;sl=$("#viewport").scrollLeft;st=$("#viewport").scrollTop});window.addEventListener("mouseup",()=>dragging=false);window.addEventListener("mousemove",e=>{if(!dragging)return;$("#viewport").scrollLeft=sl-(e.pageX-sx);$("#viewport").scrollTop=st-(e.pageY-sy)});
renderQuick();render();fit();
</script>
</body></html>
